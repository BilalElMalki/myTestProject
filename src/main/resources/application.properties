# Application
spring.application.name=calculator-app
server.port=8080

# MongoDB
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=calculator_db

# Embedded MongoDB version (used when no local MongoDB is installed)
de.flapdoodle.mongodb.embedded.version=7.0.2

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
