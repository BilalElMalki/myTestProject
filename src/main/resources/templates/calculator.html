<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Calculator</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<div class="calculator">

    <!-- Display -->
    <div class="display">
        <div class="display-expression" id="expression">&nbsp;</div>
        <div class="display-value" id="display">0</div>
    </div>

    <!-- Hidden form submitted on = -->
    <form id="calcForm" th:action="@{/calculate}" method="post" style="display:none">
        <input type="hidden" id="operand1" name="operand1"/>
        <input type="hidden" id="operator" name="operator"/>
        <input type="hidden" id="operand2" name="operand2"/>
    </form>

    <!-- Buttons Grid -->
    <div class="buttons">

        <!-- Row 1 -->
        <button class="btn btn-fn span2" onclick="clearAll()">AC</button>
        <button class="btn btn-fn" onclick="toggleSign()">+/âˆ’</button>
        <button class="btn btn-fn" onclick="percent()">%</button>
        <button class="btn btn-op" onclick="setOperator('/')">Ă·</button>

        <!-- Row 2 -->
        <button class="btn btn-num" onclick="appendDigit('7')">7</button>
        <button class="btn btn-num" onclick="appendDigit('8')">8</button>
        <button class="btn btn-num" onclick="appendDigit('9')">9</button>
        <button class="btn btn-op" onclick="setOperator('*')">Ă—</button>

        <!-- Row 3 -->
        <button class="btn btn-num" onclick="appendDigit('4')">4</button>
        <button class="btn btn-num" onclick="appendDigit('5')">5</button>
        <button class="btn btn-num" onclick="appendDigit('6')">6</button>
        <button class="btn btn-op" onclick="setOperator('-')">âˆ’</button>

        <!-- Row 4 -->
        <button class="btn btn-num" onclick="appendDigit('1')">1</button>
        <button class="btn btn-num" onclick="appendDigit('2')">2</button>
        <button class="btn btn-num" onclick="appendDigit('3')">3</button>
        <button class="btn btn-op" onclick="setOperator('+')">+</button>

        <!-- Row 5 -->
        <button class="btn btn-num span2" onclick="appendDigit('0')">0</button>
        <button class="btn btn-num" onclick="appendDecimal()">.</button>
        <button class="btn btn-equals" onclick="calculate()">=</button>

    </div>

    <!-- Error message (shown after form submit if error) -->
    <div th:if="${response != null and response.hasError()}" class="error-toast">
        <span th:text="${response.error}">error</span>
    </div>

</div>

<!-- History panel -->
<div class="history-panel" th:if="${history != null and !#lists.isEmpty(history)}">
    <h3 class="history-heading">History</h3>
    <ul class="history-list">
        <li th:each="calc : ${history}" class="history-item">
            <span class="history-expr" th:text="${calc.operand1 + ' ' + calc.operator + ' ' + calc.operand2}"></span>
            <span class="history-result" th:text="'= ' + ${calc.result}"></span>
        </li>
    </ul>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/

    // Restore result from server response into display
    var serverResult = /*[[${response != null and !response.hasError() ? response.result : null}]]*/ null;
    var serverExpr   = /*[[${response != null and !response.hasError() ? response.expression : null}]]*/ null;

    var currentValue = '0';
    var storedValue  = null;
    var pendingOp    = null;
    var justEvaled   = false;

    if (serverResult !== null) {
        currentValue = String(serverResult);
        document.getElementById('display').textContent = currentValue;
        if (serverExpr) {
            document.getElementById('expression').textContent = serverExpr;
        }
        justEvaled = true;
    }

    function updateDisplay() {
        document.getElementById('display').textContent = currentValue;
    }

    function appendDigit(digit) {
        if (justEvaled) { currentValue = '0'; justEvaled = false; }
        if (currentValue === '0') {
            currentValue = digit;
        } else {
            currentValue += digit;
        }
        updateDisplay();
    }

    function appendDecimal() {
        if (justEvaled) { currentValue = '0'; justEvaled = false; }
        if (!currentValue.includes('.')) {
            currentValue += '.';
        }
        updateDisplay();
    }

    function setOperator(op) {
        storedValue = currentValue;
        pendingOp   = op;
        currentValue = '0';
        justEvaled   = false;
        var opSymbol = {'+':'+', '-':'âˆ’', '*':'Ă—', '/':'Ă·'}[op] || op;
        document.getElementById('expression').textContent = storedValue + ' ' + opSymbol;
    }

    function calculate() {
        if (storedValue === null || pendingOp === null) return;
        document.getElementById('operand1').value = storedValue;
        document.getElementById('operator').value  = pendingOp;
        document.getElementById('operand2').value  = currentValue;
        document.getElementById('calcForm').submit();
    }

    function clearAll() {
        currentValue = '0';
        storedValue  = null;
        pendingOp    = null;
        justEvaled   = false;
        document.getElementById('expression').innerHTML = '&nbsp;';
        updateDisplay();
    }

    function toggleSign() {
        if (currentValue !== '0') {
            currentValue = currentValue.startsWith('-')
                ? currentValue.slice(1)
                : '-' + currentValue;
            updateDisplay();
        }
    }

    function percent() {
        currentValue = String(parseFloat(currentValue) / 100);
        updateDisplay();
    }

    /*]]>*/
</script>

</body>
</html>
